# docker/docker-compose.yml
# Lambda Architecture stack: Zookeeper + Kafka + Kafka-UI + MongoDB
# Sprint 1 — Foundation
# Note: no top-level "version:" field (Docker Compose V2 best practice)

services:

  # ── Zookeeper ──────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_LOG4J_ROOT_LOGLEVEL: WARN
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Kafka Broker ───────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG4J_ROOT_LOGLEVEL: WARN
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
    healthcheck:
      test:
        - "CMD-SHELL"
        - "kafka-topics --bootstrap-server localhost:9092 --list > /dev/null 2>&1"
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Kafka UI (management console) ─────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-password123}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-crypto_db}
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Kafka Producer ─────────────────────────────────────────────────────────
  producer:
    build:
      context: ../src/producer
      dockerfile: Dockerfile
    container_name: crypto-producer
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    env_file:
      - path: ../.env
        required: false          # allows fresh-clone start before `cp .env.example .env`
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-password123}@mongodb:27017/${MONGO_DB:-crypto_db}?authSource=admin

  # ── Spark Master ───────────────────────────────────────────────────────────
  spark-master:
    image: apache/spark:3.5.5
    container_name: spark-master
    restart: unless-stopped
    user: root
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      SPARK_MASTER_HOST: spark-master
      SPARK_LOG_LEVEL: WARN
      SPARK_NO_DAEMONIZE: "true"
    ports:
      - "8081:8080"   # Spark Web UI
      - "7077:7077"   # Spark master port
    volumes:
      - ../src:/app/src
      - ../data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080 > /dev/null"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Spark Worker ───────────────────────────────────────────────────────────
  spark-worker:
    image: apache/spark:3.5.5
    container_name: spark-worker
    restart: unless-stopped
    user: root
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      SPARK_WORKER_MEMORY: 2g
      SPARK_WORKER_CORES: "2"
      SPARK_LOG_LEVEL: WARN
      SPARK_NO_DAEMONIZE: "true"
    volumes:
      - ../src:/app/src
      - ../data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081 > /dev/null"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Streamlit Dashboard ────────────────────────────────────────────────────
  dashboard:
    build:
      context: ../src/dashboard
      dockerfile: Dockerfile
    container_name: crypto-dashboard
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "8501:8501"
    env_file:
      - path: ../.env
        required: false          # allows fresh-clone start before `cp .env.example .env`
    environment:
      MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-password123}@mongodb:27017/${MONGO_DB:-crypto_db}?authSource=admin
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Inference Scheduler (runs LSTM inference every 5 minutes) ─────────────
  inference_scheduler:
    build:
      context: ../src/ml
      dockerfile: Dockerfile
    container_name: inference-scheduler
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    env_file:
      - path: ../.env
        required: false
    environment:
      MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-password123}@mongodb:27017/${MONGO_DB:-crypto_db}?authSource=admin
      INFERENCE_INTERVAL_SECONDS: "300"
      COINGECKO_API_KEY: ${COINGECKO_API_KEY:-}
      SCHEDULER_FETCH_COINGECKO: "true"
    volumes:
      - ../src/ml:/app        # live model artifacts without image rebuild
      - ../data:/app/data     # CSV fallback data

  # ── FastAPI Backend ────────────────────────────────────────────────────────────
  api:
    build:
      context: ../src/api
      dockerfile: Dockerfile
    container_name: crypto-api
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-password123}@mongodb:27017/${MONGO_DB:-crypto_db}?authSource=admin
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-password123}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-crypto_quantum_terminal_secret_2026}
      MODEL_DIR: /ml/model
    volumes:
      - ../src/ml/model:/ml/model:ro   # model artifacts for version discovery (read-only)
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── React Frontend ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../src/frontend
      dockerfile: Dockerfile
    container_name: crypto-frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:80"

volumes:
  mongodb_data:
    driver: local
